services:
  - type: web
    name: markflowmd-api
    runtime: node
    rootDir: server
    # Build client + server so the API serves the SPA: one HTTPS origin for HTML + wss (real-time collab).
    buildCommand: npm ci && npm run build && cd ../client && npm ci && npm run build
    startCommand: CLIENT_DIST=../client/dist npm start
    healthCheckPath: /health
