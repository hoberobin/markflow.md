# Render Blueprint: https://render.com/docs/blueprint-spec
# Build from repo root only — do not set rootDir to `server` (Render would hide `client/` from the build).
services:
  - type: web
    name: markflow
    runtime: node
    buildCommand: cd server && npm ci && npm run build && cd ../client && npm ci && npm run build
    startCommand: cd server && CLIENT_DIST=../client/dist npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
