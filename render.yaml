services:
  - type: web
    name: markflow-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_PATH
        value: /opt/render/project/data/markflow.db
    disks:
      - name: markflow-data
        mountPath: /opt/render/project/data
        sizeGB: 1
