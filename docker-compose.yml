version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "4000:4000"
    volumes:
      - ./workspace:/app/workspace
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NODE_ENV=development
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  workspace:
