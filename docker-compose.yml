version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "4000:4000"
    volumes:
      - ./workspace:/app/workspace
      - ./data:/app/data
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/app/data/markflow.db
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  workspace:
