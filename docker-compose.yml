version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_SERVER_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
